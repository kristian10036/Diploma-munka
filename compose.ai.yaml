services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  ollama-data:
