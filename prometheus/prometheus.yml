global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    station: dm-local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: spectrum-ingest
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["spectrum-ingest:8001"]
